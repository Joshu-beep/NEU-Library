<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="neulogo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://ruajjuxabwfqpawpjosl.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1YWpqdXhhYndmcXBhd3Bqb3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTg0MjksImV4cCI6MjA4OTAzNDQyOX0.O1ZbG4vC6q4DxQKTq664i3e4xwUYcvgVDOsuNMDNK4I";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <link rel="Stylesheet" href="css/visitorlog.css" />
  </head>
  <body>
    <div id="toast">Message</div>

    <nav class="navbar">
      <div class="nav-logo">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        NEU Admin Dashboard
      </div>
      <div class="nav-right">
        <span class="welcome-text">Welcome, System Admin</span>
        <button class="logout-btn" onclick="logout()">
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </nav>

    <div class="container">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon icon-red">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
          <div class="stat-info">
            <h3>Live Occupancy</h3>
            <p id="live-stat">—</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon icon-blue">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <h3>Visits Today</h3>
            <p id="today-stat">—</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon icon-green">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <h3>This Week</h3>
            <p id="week-stat">—</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon icon-orange">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <h3>Total Registered</h3>
            <p id="total-stat">—</p>
          </div>
        </div>
      </div>

      <div class="content-card">
        <div class="toolbar">
          <div class="tab-group">
            <button class="tab active" onclick="changeView('log', this)">
              Visits Log
            </button>
            <button class="tab" onclick="changeView('users', this)">
              Manage Users
            </button>
          </div>

          <button class="btn-action btn-reset" onclick="triggerResetAll()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
              ></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            Reset DB
          </button>

          <div class="date-filter" id="dateFilterSection">
            <input
              type="date"
              class="date-input"
              id="dateFrom"
              onchange="filterByDate()"
            />
            <span>to</span>
            <input
              type="date"
              class="date-input"
              id="dateTo"
              onchange="filterByDate()"
            />
          </div>

          <div class="search-box">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="filterInput"
              placeholder="Filter by keyword..."
              onkeyup="runFilter()"
            />
          </div>

          <button class="btn-action btn-export-csv" onclick="exportCSV()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              ></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            Export CSV
          </button>
          <button class="btn-action btn-export-pdf" onclick="exportPDF()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Export PDF
          </button>
        </div>

        <!-- Visits Log View -->
        <div id="log-view">
          <table id="logTable">
            <thead>
              <tr>
                <th>Date &amp; Time</th>
                <th>Name</th>
                <th>Program</th>
                <th>Reason</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="logTableBody">
              <tr class="loading-row">
                <td colspan="5">Loading visit records...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- User Management View -->
        <div id="users-view" class="hidden">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Program</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr class="loading-row">
                <td colspan="6">Loading user records...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="js/visitorlog.js"></script>
  </body>
</html>
